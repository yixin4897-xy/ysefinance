<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Diamond icon -->
  <g transform="translate(8, 4)">
    <polygon points="12,0 24,12 12,24 0,12" fill="#e8793a" stroke="#f5a06a" stroke-width="0.5"/>
    <polygon points="12,0 24,12 12,24 0,12" fill="url(#diamondGradient)" opacity="0.8"/>
  </g>
  
  <!-- Text: YSE Finance -->
  <text x="34" y="27" font-family="'Playfair Display', serif" font-size="20" font-weight="600" fill="white" letter-spacing="0.5">YSE Finance</text>
  
  <defs>
    <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a06a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8793a;stop-opacity:1" />
    </linearGradient>
  </defs>
